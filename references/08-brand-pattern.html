<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MirrorChat Brand Pattern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F0EDE8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Instrument Sans', sans-serif;
  }

  .frame {
    width: 900px;
    height: 600px;
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(13, 27, 42, 0.08), 0 1px 4px rgba(13, 27, 42, 0.04);
    overflow: hidden;
    position: relative;
  }

  .artwork {
    width: 100%;
    height: 100%;
    background: #FAF8F5;
    position: relative;
    overflow: hidden;
  }

  /* Grain overlay */
  .artwork::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: multiply;
  }

  /* Abstract shapes */
  .shape {
    position: absolute;
    transition: none;
  }

  /* Semi-transparent circles */
  .circle-1 {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: rgba(13, 27, 42, 0.10);
    right: 120px;
    top: 80px;
  }

  .circle-2 {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(232, 99, 74, 0.15);
    right: 60px;
    top: 200px;
  }

  .circle-3 {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(91, 154, 139, 0.10);
    right: 300px;
    top: 260px;
  }

  .circle-4 {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(232, 168, 56, 0.12);
    right: 220px;
    top: 40px;
  }

  .circle-5 {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(232, 99, 74, 0.08);
    left: 180px;
    top: 320px;
  }

  /* Semi-transparent rectangles */
  .rect-1 {
    width: 220px;
    height: 140px;
    background: rgba(13, 27, 42, 0.06);
    right: 180px;
    top: 160px;
    transform: rotate(12deg);
  }

  .rect-2 {
    width: 160px;
    height: 100px;
    background: rgba(232, 168, 56, 0.10);
    right: 40px;
    top: 60px;
    transform: rotate(-5deg);
  }

  .rect-3 {
    width: 180px;
    height: 80px;
    background: rgba(91, 154, 139, 0.08);
    right: 280px;
    bottom: 100px;
    transform: rotate(3deg);
  }

  .rect-4 {
    width: 100px;
    height: 160px;
    background: rgba(232, 99, 74, 0.06);
    left: 120px;
    top: 100px;
    transform: rotate(-8deg);
  }

  /* Glass-effect shapes */
  .glass-1 {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.15);
    right: 140px;
    top: 140px;
  }

  .glass-2 {
    width: 120px;
    height: 80px;
    background: rgba(255, 255, 255, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 8px;
    box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
    right: 320px;
    top: 180px;
    transform: rotate(6deg);
  }

  .glass-3 {
    width: 100px;
    height: 100px;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 50%;
    box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.12);
    right: 60px;
    bottom: 140px;
  }

  /* Constellation lines */
  .line {
    position: absolute;
    height: 1px;
    transform-origin: left center;
  }

  .line-1 {
    width: 180px;
    background: rgba(13, 27, 42, 0.12);
    right: 200px;
    top: 220px;
    transform: rotate(-25deg);
  }

  .line-2 {
    width: 140px;
    background: rgba(232, 99, 74, 0.15);
    right: 120px;
    top: 320px;
    transform: rotate(15deg);
  }

  .line-3 {
    width: 200px;
    background: rgba(91, 154, 139, 0.12);
    right: 260px;
    top: 140px;
    transform: rotate(-45deg);
  }

  .line-4 {
    width: 160px;
    background: rgba(232, 168, 56, 0.14);
    right: 340px;
    top: 360px;
    transform: rotate(30deg);
  }

  .line-5 {
    width: 120px;
    background: rgba(13, 27, 42, 0.08);
    right: 80px;
    top: 160px;
    transform: rotate(60deg);
  }

  .line-6 {
    width: 100px;
    background: rgba(232, 99, 74, 0.10);
    left: 200px;
    top: 280px;
    transform: rotate(-15deg);
  }

  .line-7 {
    width: 90px;
    background: rgba(91, 154, 139, 0.10);
    left: 280px;
    bottom: 180px;
    transform: rotate(50deg);
  }

  /* Mirror shards — clip-path polygons */
  .shard-1 {
    width: 120px;
    height: 140px;
    background: linear-gradient(135deg, rgba(13, 27, 42, 0.08), rgba(91, 154, 139, 0.12));
    clip-path: polygon(20% 0%, 100% 15%, 85% 100%, 0% 75%);
    right: 100px;
    top: 100px;
  }

  .shard-2 {
    width: 100px;
    height: 120px;
    background: linear-gradient(160deg, rgba(232, 99, 74, 0.10), rgba(232, 168, 56, 0.14));
    clip-path: polygon(10% 5%, 90% 0%, 100% 80%, 30% 100%, 0% 60%);
    right: 260px;
    top: 200px;
  }

  .shard-3 {
    width: 80px;
    height: 100px;
    background: linear-gradient(120deg, rgba(91, 154, 139, 0.12), rgba(255, 255, 255, 0.3));
    clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 0% 85%, 15% 20%);
    right: 180px;
    bottom: 120px;
  }

  .shard-4 {
    width: 70px;
    height: 90px;
    background: linear-gradient(145deg, rgba(13, 27, 42, 0.06), rgba(232, 99, 74, 0.10));
    clip-path: polygon(0% 10%, 70% 0%, 100% 40%, 90% 100%, 20% 80%);
    right: 360px;
    top: 100px;
  }

  .shard-5 {
    width: 90px;
    height: 70px;
    background: linear-gradient(170deg, rgba(232, 168, 56, 0.10), rgba(91, 154, 139, 0.08));
    clip-path: polygon(15% 0%, 100% 20%, 85% 100%, 0% 70%);
    left: 200px;
    top: 180px;
  }

  .shard-6 {
    width: 60px;
    height: 80px;
    background: linear-gradient(130deg, rgba(255, 255, 255, 0.25), rgba(91, 154, 139, 0.10));
    clip-path: polygon(30% 0%, 100% 15%, 70% 100%, 0% 80%);
    right: 50px;
    top: 380px;
  }

  .shard-7 {
    width: 110px;
    height: 60px;
    background: linear-gradient(110deg, rgba(13, 27, 42, 0.05), rgba(232, 168, 56, 0.08));
    clip-path: polygon(0% 20%, 40% 0%, 100% 30%, 80% 100%, 10% 80%);
    left: 100px;
    bottom: 160px;
  }

  /* Focal point — aurora gradient border circle */
  .focal-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    right: 180px;
    top: 180px;
    background: rgba(250, 248, 245, 0.6);
    box-shadow: inset 0 0 40px rgba(250, 248, 245, 0.5);
    z-index: 10;
  }

  .focal-circle::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #E8634A,
      #E8A838,
      #5B9A8B,
      #0D1B2A,
      #E8634A
    );
    z-index: -1;
    opacity: 0.7;
  }

  .focal-circle::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: rgba(250, 248, 245, 0.85);
    box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.4);
  }

  /* Scattered dots */
  .dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  .dot-1  { background: rgba(13, 27, 42, 0.20);  right: 420px; top: 80px; }
  .dot-2  { background: rgba(232, 99, 74, 0.20);  right: 60px;  top: 50px; }
  .dot-3  { background: rgba(232, 168, 56, 0.20); right: 340px; top: 300px; }
  .dot-4  { background: rgba(91, 154, 139, 0.20); right: 150px; top: 400px; }
  .dot-5  { background: rgba(13, 27, 42, 0.20);   right: 500px; top: 200px; }
  .dot-6  { background: rgba(232, 99, 74, 0.20);  right: 200px; bottom: 80px; }
  .dot-7  { background: rgba(232, 168, 56, 0.20); left: 160px;  top: 120px; }
  .dot-8  { background: rgba(91, 154, 139, 0.20); left: 220px;  top: 400px; }
  .dot-9  { background: rgba(13, 27, 42, 0.15);   right: 420px; bottom: 120px; }
  .dot-10 { background: rgba(232, 99, 74, 0.15);  left: 300px;  top: 60px; }
  .dot-11 { background: rgba(232, 168, 56, 0.18); right: 100px; top: 480px; }
  .dot-12 { background: rgba(91, 154, 139, 0.18); left: 80px;   top: 260px; }
  .dot-13 { background: rgba(13, 27, 42, 0.20);   left: 340px;  bottom: 60px; }
  .dot-14 { background: rgba(232, 99, 74, 0.15);  right: 480px; top: 440px; }
  .dot-15 { background: rgba(232, 168, 56, 0.20); left: 140px;  top: 460px; }
  .dot-16 { background: rgba(91, 154, 139, 0.15); right: 520px; top: 140px; }
  .dot-17 { background: rgba(13, 27, 42, 0.18);   left: 260px;  top: 220px; }
  .dot-18 { background: rgba(232, 99, 74, 0.20);  right: 300px; bottom: 50px; }

  /* Very faint large ambient circle for depth */
  .ambient-1 {
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 168, 56, 0.04) 0%, transparent 70%);
    right: -50px;
    top: -50px;
  }

  .ambient-2 {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91, 154, 139, 0.03) 0%, transparent 70%);
    right: 200px;
    bottom: -100px;
  }

  .ambient-3 {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 99, 74, 0.03) 0%, transparent 70%);
    left: 50px;
    top: 100px;
  }

  .caption {
    margin-top: 16px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12px;
    color: #7C7C8A;
    text-align: center;
  }
</style>
</head>
<body>

<div class="frame">
  <div class="artwork">
    <!-- Ambient glows -->
    <div class="shape ambient-1"></div>
    <div class="shape ambient-2"></div>
    <div class="shape ambient-3"></div>

    <!-- Semi-transparent circles -->
    <div class="shape circle-1"></div>
    <div class="shape circle-2"></div>
    <div class="shape circle-3"></div>
    <div class="shape circle-4"></div>
    <div class="shape circle-5"></div>

    <!-- Semi-transparent rectangles -->
    <div class="shape rect-1"></div>
    <div class="shape rect-2"></div>
    <div class="shape rect-3"></div>
    <div class="shape rect-4"></div>

    <!-- Glass-effect shapes -->
    <div class="shape glass-1"></div>
    <div class="shape glass-2"></div>
    <div class="shape glass-3"></div>

    <!-- Constellation lines -->
    <div class="shape line line-1"></div>
    <div class="shape line line-2"></div>
    <div class="shape line line-3"></div>
    <div class="shape line line-4"></div>
    <div class="shape line line-5"></div>
    <div class="shape line line-6"></div>
    <div class="shape line line-7"></div>

    <!-- Mirror shards -->
    <div class="shape shard-1"></div>
    <div class="shape shard-2"></div>
    <div class="shape shard-3"></div>
    <div class="shape shard-4"></div>
    <div class="shape shard-5"></div>
    <div class="shape shard-6"></div>
    <div class="shape shard-7"></div>

    <!-- Focal point circle with aurora gradient border -->
    <div class="shape focal-circle"></div>

    <!-- Scattered dots -->
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>
    <div class="dot dot-6"></div>
    <div class="dot dot-7"></div>
    <div class="dot dot-8"></div>
    <div class="dot dot-9"></div>
    <div class="dot dot-10"></div>
    <div class="dot dot-11"></div>
    <div class="dot dot-12"></div>
    <div class="dot dot-13"></div>
    <div class="dot dot-14"></div>
    <div class="dot dot-15"></div>
    <div class="dot dot-16"></div>
    <div class="dot dot-17"></div>
    <div class="dot dot-18"></div>
  </div>
</div>

<p class="caption">MirrorChat Brand Pattern &mdash; Decorative Use</p>

</body>
</html>
